services:
  litellm-proxy:
    # Pinned to a versioned stable tag — bump from
    # https://github.com/BerriAI/litellm/releases when needed.
    image: litellm/litellm:v1.83.14-stable
    container_name: qwen-coprocessor-proxy
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file: [".env"]
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_LOG=${LITELLM_LOG:-INFO}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - QWEN_LOCAL_BASE_URL=${QWEN_LOCAL_BASE_URL}
      - QWEN_REMOTE_BASE_URL=${QWEN_REMOTE_BASE_URL}
      - ROUTER_LARGE_PROMPT_TOKENS=${ROUTER_LARGE_PROMPT_TOKENS:-8000}
      - ROUTER_HARD_KEYWORDS=${ROUTER_HARD_KEYWORDS:-}
      - ROUTER_REMOTE_THRESHOLD_TOKENS=${ROUTER_REMOTE_THRESHOLD_TOKENS:-2000}
    extra_hosts:
      # Allow strix-halo.local style mDNS to resolve from inside the container
      # via the host's resolver. host-gateway points at the Docker host.
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml:ro
      - ./config/router.py:/app/router.py:ro
      - ./logs/litellm:/app/logs
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
      - "--host"
      - "0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/health/liveliness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # --- Optional observability stack ---
  # Enable with: docker compose --profile observability up -d
  langfuse:
    image: langfuse/langfuse:latest
    container_name: qwen-langfuse
    profiles: ["observability"]
    restart: unless-stopped
    ports: ["3000:3000"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=change-me
      - SALT=change-me
      - ENCRYPTION_KEY=change-me
      - NEXT_PUBLIC_LANGFUSE_CLOUD_REGION=SELF_HOSTED
    depends_on: [langfuse-db]

  langfuse-db:
    image: postgres:15-alpine
    container_name: qwen-langfuse-db
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data

volumes:
  langfuse-db-data:
